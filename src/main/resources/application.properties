spring.application.name=coatchinghub
server.port=8080

spring.datasource.platform=postgres
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=coatching-hub
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format-sql=true
spring.jpa.show-sql=true

spring.profiles.active=default

# flyway configuration
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.validateOnMigrate=true
spring.flyway.locations=classpath:db/migration

jwt.secret=h8zSRONwdjRoOQ9kSFFmNnIiYL4dhnHLTLDaOh9Ecm4=
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000


# Force UTF-8 for all HTTP responses
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.http.encoding.charset=UTF-8


app.storage.upload-dir=D:/uploads/coashing-hub

# Zoho SMTP mail configuration
spring.mail.host=${MAIL_HOST:smtp.zoho.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:admin@coachinghub.ae}
spring.mail.password=${MAIL_PASSWORD:Chub@ppP0rtal}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:${spring.mail.username:admin@coachinghub.ae}}
